<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stables | MDS connection test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            padding: 40px;
            background: #0a0e27;
            color: #fff;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            margin-bottom: 20px;
            color: #8b5cf6;
        }

        .status {
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .success {
            background: rgba(34, 197, 94, 0.1);
            border-color: #22c55e;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border-color: #ef4444;
        }

        .info {
            background: rgba(59, 130, 246, 0.1);
            border-color: #3b82f6;
        }

        button {
            background: #8b5cf6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 10px 10px 0;
        }

        button:hover {
            background: #7c3aed;
        }

        pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            margin-top: 10px;
            font-size: 14px;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        .badge.ok {
            background: #22c55e;
            color: #000;
        }

        .badge.fail {
            background: #ef4444;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🧪 Stables MDS Connection Test</h1>

        <div id="mdsStatus" class="status info">
            <strong>Checking MDS availability...</strong>
        </div>

        <div style="margin: 30px 0;">
            <button onclick="testConnection()">Test Connection</button>
            <button onclick="getBalance()">Get Balance</button>
            <button onclick="getAddress()">Get Address</button>
            <button onclick="getNodeStatus()">Node Status</button>
        </div>

        <div id="results"></div>
    </div>

    <!-- MDS Library (provided by Winiwa OS) -->
    <script type="text/javascript" src="mds.js"></script>

    <!-- Our Winiwa Integration -->
    <script src="assets/minima-integration.js"></script>

    <script>
        // Check if MDS is available
        window.addEventListener('load', function () {
            const statusEl = document.getElementById('mdsStatus');

                if (typeof MDS !== 'undefined') {
                statusEl.className = 'status success';
                statusEl.innerHTML = '<strong>✅ MDS Available</strong><span class="badge ok">RUNNING IN WINIWA OS</span><br>You can now test blockchain functions!';
            } else {
                statusEl.className = 'status error';
                statusEl.innerHTML = '<strong>❌ MDS Not Available</strong><span class="badge fail">BROWSER MODE</span><br>Please install this MiniDapp in Winiwa OS to test blockchain features.';
            }
        });

        function showResult(title, data, isError = false) {
            const resultsEl = document.getElementById('results');
            const statusClass = isError ? 'error' : 'success';
            const icon = isError ? '❌' : '✅';

            resultsEl.innerHTML = `
        <div class="status ${statusClass}">
          <strong>${icon} ${title}</strong>
          <pre>${JSON.stringify(data, null, 2)}</pre>
        </div>
      ` + resultsEl.innerHTML;
        }

        async function testConnection() {
            if (!Minima.isAvailable()) {
                showResult('Connection Test', { error: 'MDS not available - not running in Winiwa OS' }, true);
                return;
            }

            try {
                const status = await Minima.getStatus();
                showResult('Connection Test', {
                    connected: true,
                    blockHeight: status.chain.block,
                    devices: status.devices,
                    version: status.version
                });
            } catch (error) {
                showResult('Connection Test', { error: error.message }, true);
            }
        }

        async function getBalance() {
            if (!Minima.isAvailable()) {
                showResult('Get Balance', { error: 'MDS not available' }, true);
                return;
            }

            try {
                const balance = await Minima.getBalance();
                showResult('Balance', balance);
            } catch (error) {
                showResult('Get Balance', { error: error.message }, true);
            }
        }

        async function getAddress() {
            if (!Minima.isAvailable()) {
                showResult('Get Address', { error: 'MDS not available' }, true);
                return;
            }

            try {
                const address = await Minima.getAddress();
                showResult('Wallet Address', { address });
            } catch (error) {
                showResult('Get Address', { error: error.message }, true);
            }
        }

        async function getNodeStatus() {
            if (!Minima.isAvailable()) {
                showResult('Node Status', { error: 'MDS not available' }, true);
                return;
            }

            try {
                const status = await Minima.getStatus();
                showResult('Node Status', {
                    chain: status.chain,
                    network: status.network,
                    memory: status.memory,
                    uptime: status.uptime
                });
            } catch (error) {
                showResult('Node Status', { error: error.message }, true);
            }
        }
    </script>
</body>

</html>
